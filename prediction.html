<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prediction - Iris ML</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #173f3f, #063546);
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 50px;
    background: rgba(10, 27, 90, 0.7);
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
}

/* Container */
.container {
    text-align: center;
    margin-top: 40px;
}

/* Form */
form {
    margin-top: 20px;
}

input {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 250px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #00c5cc;
    border: none;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* Result */
.result {
    margin-top: 30px;
}

.result img {
    width: 200px;
    border-radius: 10px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>Iris ML</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/dataset">Dataset</a>
        <a href="/prediction">Prediction</a>
        <a href="/contact">Contact</a>
    </div>
</div>

<div class="container">

<h1>Predict Iris Flower</h1>

<form action="/predict" method="POST">
    <input type="text" name="sepal_length" placeholder="Sepal Length" required>
    <input type="text" name="sepal_width" placeholder="Sepal Width" required>
    <input type="text" name="petal_length" placeholder="Petal Length" required>
    <input type="text" name="petal_width" placeholder="Petal Width" required>

    <button type="submit">Predict</button>
</form>

<!-- Result -->
{% if prediction_text %}
<div class="result">
    <h2>{{ prediction_text }}</h2>

    {% if flower_image %}
        <img src="{{ url_for('static', filename=flower_image) }}">
    {% endif %}
</div>
{% endif %}

</div>

</body>
</html>
