<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact - Iris Flower Classification</title>
    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
            margin:0;
        }

        /* Navigation bar */
        .navbar{
            background-color:#333;
            overflow:hidden;
        }

        .navbar a{
            float:left;
            color:white;
            text-align:center;
            padding:14px 20px;
            text-decoration:none;
            font-size:18px;
        }

        .navbar a:hover{
            background-color:#ddd;
            color:black;
        }

        /* Contact form */
        .container{
            width:50%;
            margin:auto;
            background:white;
            padding:30px;
            margin-top:40px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(9, 55, 90, 0.2);
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #0b5b7d;
            border-radius:5px;
        }

        button{
            background:#4CAF50;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

        h2{
            text-align:center;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/dataset">Dataset</a>
    <a href="/prediction">Prediction</a>
    <a href="/contact">Contact</a>
</div>

<div class="container">
    <h2>Contact Us</h2>

    <form>
        <label>Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Message</label>
        <textarea rows="5" placeholder="Write your message here"></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
